{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4 text-center">
        <img src="{{ url_for('static', filename='philgeps.png') }}" alt="PhilGEPS Logo" class="img-fluid mb-3" style="max-width: 120px;">
        <h2 class="h4 mb-3">Login</h2>
        <p class="text-muted mb-4">Enter your credentials to access the PhilGEPS monitoring dashboard.</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="remember" id="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
