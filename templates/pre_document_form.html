{% extends 'base.html' %}
{% block content %}
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    color: #2c3e50;
    min-height: 100vh;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: #667eea;
    text-decoration: none;
    font-weight: 500;
    margin-bottom: 1.5rem;
    transition: all 0.3s ease;
  }

  .back-link:hover {
    gap: 0.75rem;
    color: #764ba2;
  }

  .card {
    background: white;
    border-radius: 0.75rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    overflow: hidden;
  }

  .card-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 2rem;
  }

  .card-header h2 {
    font-size: 1.5rem;
    margin: 0;
  }

  .card-body {
    padding: 2rem;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  label {
    font-weight: 600;
    color: #4a5568;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  input[type="text"],
  textarea,
  input[type="file"] {
    padding: 0.875rem;
    border: 2px solid #e2e8f0;
    border-radius: 0.5rem;
    font-size: 0.95rem;
    font-family: inherit;
    transition: all 0.3s ease;
  }

  input[type="text"]:focus,
  textarea:focus,
  input[type="file"]:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  textarea {
    resize: vertical;
    min-height: 120px;
  }

  input[type="file"] {
    cursor: pointer;
    padding: 0.75rem;
  }

  .form-text {
    font-size: 0.85rem;
    color: #718096;
    margin-top: 0.5rem;
  }

  .form-actions {
    display: flex;
    gap: 1rem;
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid #e2e8f0;
  }

  .btn {
    padding: 0.75rem 1.5rem;
    border: none;
    border-radius: 0.5rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    text-decoration: none;
    display: inline-block;
    flex: 1;
    text-align: center;
  }

  .btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
  }

  .btn-secondary {
    background: #f0f4ff;
    color: #667eea;
    border: 2px solid #667eea;
  }

  .btn-secondary:hover {
    background: #667eea;
    color: white;
  }

  @media (max-width: 768px) {
    .container {
      padding: 1.5rem 1rem;
    }

    .form-actions {
      flex-direction: column;
    }

    .btn {
      flex: unset;
    }
  }
</style>

<div class="container">
  <a href="{{ url_for('pre_documents_list') }}" class="back-link">
    <span>←</span> Back to pre documents
  </a>

  <div class="card">
    <div class="card-header">
      <h2>Upload Pre Document</h2>
    </div>

    <div class="card-body">
      <form method="post" enctype="multipart/form-data">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" required placeholder="Enter document title">
        </div>

        <div class="form-group">
          <label for="supplier_name">Supplier Name</label>
          <input type="text" id="supplier_name" name="supplier_name" placeholder="Enter supplier name (optional)">
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" placeholder="Add a description (optional)"></textarea>
        </div>

        <div class="form-group">
          <label for="file">File</label>
          <input type="file" id="file" name="file" required>
          <div class="form-text">
            Supported formats: PDF, DOCX, XLSX, PNG, JPG, JPEG, TXT
          </div>
        </div>

        <div class="form-actions">
          <a href="{{ url_for('pre_documents_list') }}" class="btn btn-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary">Save Document</button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
